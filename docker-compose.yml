services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Container base image defaults to UTC — task date/time are stored as plain
      # "local wall-clock" strings with no timezone info (whatever the user's browser
      # showed them), so the server's own clock must agree or reminders (and anything
      # else comparing against "now") fire hours off. Override TZ in .env if deploying
      # outside Bulgaria.
      - TZ=${TZ:-Europe/Sofia}
    env_file:
      - .env
    volumes:
      - planer-data:/app/backend/data
      # Bind mount (not the named volume) so backups land in a host-visible folder —
      # easy to copy elsewhere (external drive, cloud sync) for real offsite protection.
      - ./backups:/app/backend/backups
      # Same reasoning: uploaded task images stay host-visible and easy to back up.
      - ./uploads:/app/backend/uploads
    ports:
      - "3000:3000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  planer-data:
